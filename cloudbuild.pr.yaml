steps:
  - id: frontend-lint
    name: node:20
    entrypoint: bash
    args:
      - -ceu
      - |
          npm ci
          npm run lint

  - id: api-contract-tests
    name: python:3.12
    entrypoint: bash
    args:
      - -ceu
      - |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements-dev.txt
          python -m unittest discover api/tests

timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
