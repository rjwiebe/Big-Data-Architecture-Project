substitutions:
  _REGION: us-central1
  _SERVICE_NAME: rtd-api
  _AR_REPO: rtd-containers
  _IMAGE_NAME: rtd-api
  _IMAGE_TAG: ""
  _POSTGRES_DSN_SECRET: postgres-dsn
  _REDIS_URL_SECRET: ""
  _ALLOWED_ORIGINS: ""
  _RUNTIME_SERVICE_ACCOUNT: ""
  _VPC_NETWORK: ""
  _VPC_SUBNET: ""
  _VPC_EGRESS: "private-ranges-only"

steps:
  - id: build-api-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
          IMAGE_URI="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}"
          docker build -f api/Dockerfile -t "$${IMAGE_URI}" .
          printf '%s' "$${IMAGE_URI}" > /workspace/image_uri.txt

  - id: push-api-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
          IMAGE_URI="$$(cat /workspace/image_uri.txt)"
          docker push "$${IMAGE_URI}"

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
          IMAGE_URI="$$(cat /workspace/image_uri.txt)"
          RUNTIME_SERVICE_ACCOUNT="${_RUNTIME_SERVICE_ACCOUNT}"

          DEPLOY_CMD=(
            gcloud run deploy "${_SERVICE_NAME}"
            --project "${PROJECT_ID}"
            --region "${_REGION}"
            --platform managed
            --image "$${IMAGE_URI}"
            --service-account "$${RUNTIME_SERVICE_ACCOUNT}"
            --allow-unauthenticated
            --set-secrets "POSTGRES_DSN=${_POSTGRES_DSN_SECRET}:latest"
            --quiet
          )

          if [[ -n "${_REDIS_URL_SECRET}" ]]; then
            DEPLOY_CMD+=(--set-secrets "REDIS_URL=${_REDIS_URL_SECRET}:latest")
          fi

          if [[ -n "${_ALLOWED_ORIGINS}" ]]; then
            DEPLOY_CMD+=(--set-env-vars "ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}")
          fi

          if [[ -n "${_VPC_NETWORK}" ]]; then
            DEPLOY_CMD+=(--network "${_VPC_NETWORK}")
          fi

          if [[ -n "${_VPC_SUBNET}" ]]; then
            DEPLOY_CMD+=(--subnet "${_VPC_SUBNET}")
          fi

          if [[ -n "${_VPC_NETWORK}" || -n "${_VPC_SUBNET}" ]]; then
            DEPLOY_CMD+=(--vpc-egress "${_VPC_EGRESS}")
          fi

          "$${DEPLOY_CMD[@]}"

timeout: 1800s
options:
  logging: CLOUD_LOGGING_ONLY
